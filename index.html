<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みんなで育てるノイマン</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>みんなで育てるノイマン</h1>
    <p class="subtitle">みんなが研究室に来ると、ノイマンに愛情を与えることができるよ！</p>
  </header>

  <!-- -----------------------------------------------------------------------
    Main scene: pet in center, member avatars arranged around it
  ------------------------------------------------------------------------ -->
  <div class="scene">

    <!-- Member avatars positioned around the pet in an ellipse.
         Positions are calculated so 13 avatars spread evenly around a
         380×380px ellipse (cx=210, cy=210, rx=170, ry=155).
         Replace initials with real member names and add background-image for photos -->
    <div id="member-ring">

      <!--
        Ellipse parameters used for positioning:
          center: (211, 211) within the 420x420 scene
          rx = 172, ry = 150
          angle step = 360/13 ≈ 27.69°, starting from top (−90°)
          Avatar size = 48px, so offset each by −24px to center.

        Member 1  angle=  -90.0°  → left: 187px, top:  37px
        Member 2  angle=  -62.3°  → left: 323px, top:  65px
        Member 3  angle=  -34.6°  → left: 354px, top: 145px  (approx)
        Member 4  angle=   -6.9°  → left: 357px, top: 186px
        Member 5  angle=   20.8°  → left: 316px, top: 288px
        Member 6  angle=   48.5°  → left: 247px, top: 342px
        Member 7  angle=   76.2°  → left: 154px, top: 357px
        Member 8  angle=  103.9°  → left:  62px, top: 342px
        Member 9  angle=  131.5°  → left:   8px, top: 288px
        Member 10 angle=  159.2°  → left:   7px, top: 186px  (approx)
        Member 11 angle=  186.9°  → left:  18px, top: 145px
        Member 12 angle=  214.6°  → left:  59px, top:  65px
        Member 13 angle=  242.3°  → left: 131px, top:  37px
      -->

      <!-- Avatars are dynamically generated by renderAvatars() in app.js -->

    </div><!-- /#member-ring -->

    <!-- -----------------------------------------------------------------------
      Pet character — image swaps based on mood via JS.
      Images: imgs/noiman-base.png / noiman-happy.png / noiman-sad.png
    ------------------------------------------------------------------------ -->
    <div id="pet-wrapper">
      <img id="pet" class="pet mood-neutral" src="imgs/noiman-base.png" alt="Lab Pet" />
    </div><!-- /#pet-wrapper -->

  </div><!-- /.scene -->

  <!-- -----------------------------------------------------------------------
    Info panel: stage name, progress bar, feeding rate
  ------------------------------------------------------------------------ -->
  <div class="info-panel">

    <div class="stage-row">
      <span class="stage-label">Level</span>
      <span id="stage-name">Lv.1</span>
    </div>

    <div>
      <div class="progress-bar-track">
        <div id="progress-fill" style="width: 0%"></div>
      </div>
      <div id="progress-text">0 / 99 pts</div>
    </div>

    <div id="feeding-rate" class="feeding-rate sleeping">😴 nobody home</div>

    <div class="meta">
      <!-- <span id="total-points">Total: 0 pts</span> -->
      <span id="last-updated">Updating…</span>
    </div>

  </div><!-- /.info-panel -->

  <!-- Scripts — config and api must load before app -->
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>

</body>
</html>
